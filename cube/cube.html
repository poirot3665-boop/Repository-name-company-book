<!DOCTYPE html>
<html lang="ja">

<head>
    <title>無人航空機</title>
    <meta charset="UTF-8">
    <meta name="keywords" content="drone,ドローン,無人航空機,武井の島展望台,憩いの丘公園">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!---->
    <!-- リセットcss -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link href="cube.css" rel="stylesheet" media="all">
    <link rel="icon" href="favicon.ico">
</head>

<body>
    <!-- 背景 -->
    <section>
        <div class="container">
        </div>
    </section>

    <header id="header">
        <!--  <h1>無人航空機の飛行形態の分類（カテゴリーⅠ～Ⅲ）</h1>
        <p>飛行の禁止空域及び飛行の方法に関する無人航空機の飛行形態については、そのリスクに応じて
            次に掲げるとおりに分類される。</p> -->
    </header>

    <main>

        <!-- キューブの骨組みを作る -->
        <div class="cube" id="flying-box">
            <div class="cube-face front"><small>武井の島展望台</small></div>
            <div class="cube-face back">憩いの丘公園</div>
            <div class="cube-face right">標高５７ｍ</div>
            <div class="cube-face left">景勝地</div>
            <div class="cube-face top">函館市浜町</div>
            <div class="cube-face bottom">公園駐車場有</div>
        </div>

        <script src="cube.js" defer></script>

    </main>

    <footer>
        <p>2025.8.11（月）山の日<br>
            DJI Air3にて空撮をする。予定で汐首の山で飛行等の練習をするはずだったが、
            熊の出没も相まって立ち入り禁止措置が講じられていた。<br>
            その為、景色が良いこの場所でドローンを墜落させたらお仕舞いの海上を飛行させた。</p>
