        <h1>無人航空機の飛行の許可が必要となる空域</h1>
        <p>「空港等の周辺」、「緊急用務空域」、「150m以上の上空」、「人口集中地区」のように、<br>
            航空機の航行の安全に影響を及ぼすおそれのある空域や、落下した場合に地上の人等に危害を及ぼす恐れが<br>
            高い空域において、無人航空機を飛行させる場合には、あらかじめ、国土交通大臣（申請先は飛行エリアを<br>
            管轄する地方航空局・空港事務所）の許可を受ける必要があります。</p>
